<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>订单管理 - 私厨上门商户端</title>

<body data-page="order-list">
  <div class="app-shell">
    <header class="app-header"><div><h1 class="header-title">订单管理</h1><p class="header-subtitle">商户统一确认、派单和跟踪上门服务</p></div></header>
    <main class="main app-main">
      <section class="section">
        <div class="tabs" data-filter-group data-filter-target="[data-order-card]" data-empty-target="#order-empty">
          <button class="tab is-active" type="button" data-filter="all">全部</button><button class="tab" type="button" data-filter="待确认">待确认</button><button class="tab" type="button" data-filter="待派单">待派单</button><button class="tab" type="button" data-filter="服务中">服务中</button><button class="tab" type="button" data-filter="已完成">已完成</button>
        </div>
      </section>
      <section class="section">
        <article class="order-card" data-order-card data-status="待确认"><div class="card-top"><div><strong class="item-title">YY2026062601 · 陈先生</strong><span class="item-subtitle">明天 12:00 · 山水华庭 · 8 人</span></div><span class="badge">待确认</span></div><div class="detail-grid"><div class="detail"><span>套餐</span><strong>生日宴套餐</strong></div><div class="detail"><span>金额</span><strong>¥1,680</strong></div></div><div class="actions"><a class="btn" href="order-detail.html">确认接单</a><a class="btn secondary" href="order-progress.html">进度</a></div></article>
        <article class="order-card" data-order-card data-status="待派单"><div class="card-top"><div><strong class="item-title">YY2026062602 · 周女士</strong><span class="item-subtitle">今晚 18:30 · 滨湖壹号 · 6 人</span></div><span class="badge amber">待派单</span></div><div class="detail-grid"><div class="detail"><span>套餐</span><strong>家常四菜一汤</strong></div><div class="detail"><span>金额</span><strong>¥688</strong></div></div><div class="actions"><a class="btn" href="order-assign.html">分配厨师</a><a class="btn secondary" href="order-detail.html">查看</a></div></article>
        <article class="order-card" data-order-card data-status="服务中"><div class="card-top"><div><strong class="item-title">YY2026062509 · 刘女士</strong><span class="item-subtitle">今日 11:30 · 汉丰湖畔 · 4 人</span></div><span class="badge green">服务中</span></div><div class="actions"><a class="btn" href="order-progress.html">查看进度</a><button class="btn secondary" type="button" data-toast="已通知现场负责人静态演示">联系现场</button></div></article>
        <article class="order-card" data-order-card data-status="已完成"><div class="card-top"><div><strong class="item-title">YY2026062408 · 王先生</strong><span class="item-subtitle">昨天 18:00 · 滨湖商务中心 · 12 人</span></div><span class="badge green">已完成</span></div><div class="actions"><a class="btn secondary" href="../finance/settlement.html">查看结算</a></div></article>
      </section>
      <div id="order-empty" class="empty-state" hidden>当前状态暂无订单</div>
    </main>
    <nav class="bottom-nav"><a class="nav-item" data-nav="home" href="../dashboard/merchant-home.html"><span>首</span><span>首页</span></a><a class="nav-item" data-nav="orders" href="order-list.html"><span>单</span><span>订单</span></a><a class="nav-item" data-nav="menu" href="../menu/package-list.html"><span>套</span><span>套餐</span></a><a class="nav-item" data-nav="data" href="../data/data-overview.html"><span>数</span><span>数据</span></a><a class="nav-item" data-nav="mine" href="../mine/profile.html"><span>我</span><span>我的</span></a></nav>
