<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>审核结果 - 私厨上门商户端</title>
  <link rel="stylesheet" href="../../assets/css/base.css">
  <link rel="stylesheet" href="../../assets/css/app.css">
  <link rel="icon" href="data:,">
</head>
<body class="theme-commerce" data-page="verify-result">
  <div class="app-shell">
    <header class="app-header"><div><h1 class="header-title">审核结果</h1><p class="header-subtitle">展示商户入驻审核状态</p></div></header>
    <main class="main app-main">
      <section class="hero-panel"><p class="section-note">当前状态</p><h2 class="section-title">资料审核中，预计 1 个工作日内完成</h2></section>
      <section class="section">
        <article class="card"><div class="card-top"><div><strong class="item-title">审核中</strong><span class="item-subtitle">营业执照、食品经营许可和收款账户已提交</span></div><span class="badge amber">进行中</span></div></article>
        <article class="card"><div class="card-top"><div><strong class="item-title">审核通过示例</strong><span class="item-subtitle">通过后可进入商户首页管理订单和套餐</span></div><span class="badge green">通过</span></div></article>
        <article class="card"><div class="card-top"><div><strong class="item-title">审核失败示例</strong><span class="item-subtitle">食品经营许可照片不清晰时需重新提交</span></div><span class="badge coral">需补充</span></div></article>
      </section>
      <section class="actions"><a class="btn" href="../dashboard/merchant-home.html">进入商户首页</a><a class="btn secondary" href="license-upload.html">重新上传</a></section>
    </main>
  </div>
  <div class="toast" data-toast-root hidden></div>
  <script src="../../assets/js/mock.js" defer></script>
