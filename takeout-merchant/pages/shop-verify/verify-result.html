<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>审核结果 - 外卖商户端</title>
  <link rel="stylesheet" href="../../assets/css/base.css">
  <link rel="stylesheet" href="../../assets/css/app.css">
  <link rel="icon" href="data:,">
</head>
<body data-page="verify-result">
  <div class="app-shell">
    <header class="app-header">
      <div class="header-row">
        <a class="back-link" href="shop-info.html" aria-label="返回">‹</a>
        <div style="flex:1"><h1 class="header-title">入驻审核结果</h1><p class="header-subtitle">商户开店审核状态静态展示</p></div>
      </div>
    </header>
    <main class="main app-main">
      <section class="hero-panel">
        <p class="section-note">当前状态</p>
        <h2 class="section-title">审核通过，可以开始营业</h2>
        <p class="header-subtitle">店铺资料已通过静态演示审核，进入商户首页查看经营工作台。</p>
      </section>
      <section class="section result-list">
        <article class="result-card"><div class="card-top"><strong class="item-title">审核中</strong><span class="badge amber">资料核验</span></div><span class="item-subtitle">平台正在核对门店资料、联系人和经营类目。</span></article>
        <article class="result-card is-active"><div class="card-top"><strong class="item-title">审核通过</strong><span class="badge green">当前</span></div><span class="item-subtitle">商户可进入首页，处理外卖订单和商品上下架。</span></article>
        <article class="result-card"><div class="card-top"><strong class="item-title">审核失败</strong><span class="badge coral">示例</span></div><span class="item-subtitle">如资料不完整，可重新提交门店地址或营业时间。</span></article>
      </section>
      <section class="section">
        <a class="btn black" href="../dashboard/merchant-home.html">进入商户首页</a>
      </section>
    </main>
  </div>
  <div class="toast" data-toast-root hidden></div>
  <script src="../../assets/js/mock.js" defer></script>
</body>
</html>
