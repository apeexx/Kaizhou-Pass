    <header class="app-header"><div><h1 class="header-title">财务结算</h1><p class="header-subtitle">查看收入、待结算、提现和到账状态</p></div></header>
    <main class="main app-main">
      <section class="hero-panel has-photo"><div><p class="section-note">可提现金额</p><h2 class="section-title">¥8,620.00</h2><p class="header-subtitle">今日收入 ¥2,680.00 · 待结算 ¥3,420.00 · 累计收入 ¥128,600.00</p></div><img class="hero-photo" src="../../assets/images/takeout-packaging.jpg" alt="外卖收入来自门店出餐"></section>

        <article class="stat-card"><span class="stat-label">今日收入</span><strong class="stat-value">¥2,680</strong><span class="stat-trend">38 单完成</span></article>
        <article class="stat-card"><span class="stat-label">待结算金额</span><strong class="stat-value">¥3,420</strong><span class="stat-trend">预计明日到账</span></article>
      </section>

        <div class="section-header"><h2 class="section-title">结算记录</h2><span class="badge">近 3 笔</span></div>
        <article class="card"><div class="card-top"><strong class="item-title">2026-06-26</strong><span class="badge amber">结算中</span></div><div class="detail-grid"><div class="detail"><span>订单收入</span><strong>¥2,680</strong></div><div class="detail"><span>平台服务费</span><strong>¥188</strong></div><div class="detail"><span>实际到账</span><strong>¥2,492</strong></div><div class="detail"><span>状态</span><strong>待到账</strong></div></div></article>
        <article class="card"><div class="card-top"><strong class="item-title">2026-06-25</strong><span class="badge green">已到账</span></div><div class="detail-grid"><div class="detail"><span>订单收入</span><strong>¥3,120</strong></div><div class="detail"><span>平台服务费</span><strong>¥218</strong></div><div class="detail"><span>实际到账</span><strong>¥2,902</strong></div><div class="detail"><span>状态</span><strong>已到账</strong></div></div></article>
      </section>
