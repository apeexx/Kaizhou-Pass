<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>商品管理 - 外卖商户端</title>
  <link rel="stylesheet" href="../../assets/css/base.css">
  <link rel="stylesheet" href="../../assets/css/app.css">
  <link rel="icon" href="data:,">
</head>
<body data-page="goods-list">
  <div class="app-shell">
    <header class="app-header">
      <div class="header-row"><div><h1 class="header-title">商品管理</h1><p class="header-subtitle">维护外卖菜品、库存、价格和上下架状态</p></div><a class="btn secondary" href="goods-edit.html">新增商品</a></div>
    </header>
    <main class="main app-main">
      <section class="section">
        <div class="tabs" data-filter-group data-filter-target="[data-goods-card]" data-empty-target="#goods-empty">
          <button class="tab is-active" type="button" data-filter="all">全部</button>
          <button class="tab" type="button" data-filter="热销">热销</button>
          <button class="tab" type="button" data-filter="主食">主食</button>
          <button class="tab" type="button" data-filter="小吃">小吃</button>
          <button class="tab" type="button" data-filter="饮品">饮品</button>
          <button class="tab" type="button" data-filter="套餐">套餐</button>
        </div>
      </section>
      <section class="section">
        <article class="goods-card" data-goods-card data-type="热销"><span class="food-thumb has-image"><img src="../../assets/images/fish-dish.jpg" alt="招牌鸡腿饭商品图"></span><div><div class="card-top"><strong class="item-title">招牌鸡腿饭</strong><span class="badge green">上架</span></div><span class="item-subtitle">月售 486 · 库存 82 · ¥32.00</span><div class="actions"><a class="btn secondary" href="goods-edit.html">编辑</a><button class="btn ghost" type="button" data-toast="下架状态静态演示">下架</button></div></div></article>
        <article class="goods-card" data-goods-card data-type="主食"><span class="food-thumb has-image"><img src="../../assets/images/soup-dish.jpg" alt="牛肉小面商品图"></span><div><div class="card-top"><strong class="item-title">牛肉小面</strong><span class="badge green">上架</span></div><span class="item-subtitle">月售 320 · 库存 56 · ¥28.00</span><div class="actions"><a class="btn secondary" href="goods-edit.html">编辑</a><button class="btn ghost" type="button" data-toast="下架状态静态演示">下架</button></div></div></article>
        <article class="goods-card" data-goods-card data-type="小吃"><span class="food-thumb has-image"><img src="../../assets/images/takeout-packaging.jpg" alt="小吃拼盘商品图"></span><div><div class="card-top"><strong class="item-title">小吃拼盘</strong><span class="badge amber">库存低</span></div><span class="item-subtitle">月售 188 · 库存 9 · ¥26.00</span><div class="actions"><a class="btn secondary" href="goods-edit.html">编辑</a><button class="btn ghost" type="button" data-toast="补库存静态演示">补库存</button></div></div></article>
        <article class="goods-card" data-goods-card data-type="饮品"><span class="food-thumb has-image"><img src="../../assets/images/private-dinner.jpg" alt="手打柠檬茶商品图"></span><div><div class="card-top"><strong class="item-title">手打柠檬茶</strong><span class="badge green">上架</span></div><span class="item-subtitle">月售 260 · 库存 120 · ¥12.00</span><div class="actions"><a class="btn secondary" href="goods-edit.html">编辑</a><button class="btn ghost" type="button" data-toast="下架状态静态演示">下架</button></div></div></article>
        <article class="goods-card" data-goods-card data-type="套餐"><span class="food-thumb has-image"><img src="../../assets/images/family-banquet.jpg" alt="双人工作餐商品图"></span><div><div class="card-top"><strong class="item-title">双人工作餐</strong><span class="badge">下架</span></div><span class="item-subtitle">月售 76 · 库存 0 · ¥68.00</span><div class="actions"><a class="btn secondary" href="goods-edit.html">编辑</a><button class="btn ghost" type="button" data-toast="上架状态静态演示">上架</button></div></div></article>
      </section>
      <div id="goods-empty" class="empty-state" hidden>当前分类暂无商品</div>
    </main>
    <nav class="bottom-nav">
      <a class="nav-item" data-nav="home" href="../dashboard/merchant-home.html"><span class="nav-icon">首</span><span>首页</span></a>
      <a class="nav-item" data-nav="orders" href="../orders/order-list.html"><span class="nav-icon">单</span><span>订单</span></a>
      <a class="nav-item" data-nav="goods" href="goods-list.html"><span class="nav-icon">品</span><span>商品</span></a>
      <a class="nav-item" data-nav="data" href="../data/data-overview.html"><span class="nav-icon">数</span><span>数据</span></a>
      <a class="nav-item" data-nav="mine" href="../mine/profile.html"><span class="nav-icon">我</span><span>我的</span></a>
    </nav>
  </div>
  <div class="toast" data-toast-root hidden></div>
  <script src="../../assets/js/mock.js" defer></script>
</body>
</html>
