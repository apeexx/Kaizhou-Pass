<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>外卖商户登录 - 外卖商户端</title>
  <link rel="stylesheet" href="../../assets/css/base.css">
  <link rel="stylesheet" href="../../assets/css/app.css">
  <link rel="icon" href="data:,">
</head>
<body class="theme-commerce" data-page="login">
  <div class="app-shell">
    <section class="auth-hero">
      <a class="back-link" href="../../index.html" aria-label="返回">‹</a>
      <img class="mascot" src="../../assets/images/restaurant-store.jpg" alt="外卖商户门店">
      <h1>外卖商户登录</h1>
      <p>进入店铺工作台，处理待接单、备餐、配送中和售后订单。</p>
    </section>
    <main class="main is-auth">
      <section class="section">
        <form class="form-card form-grid" data-demo-form data-success="登录成功，进入商户首页" data-redirect="../dashboard/merchant-home.html">
          <div class="field"><label for="phone">商户手机号</label><input id="phone" inputmode="tel" placeholder="请输入商户手机号"></div>
          <div class="field"><label for="password">密码或验证码</label><input id="password" placeholder="请输入密码或验证码"></div>
          <button class="btn secondary" type="button" data-toast="验证码发送静态演示">获取验证码</button>
          <button class="btn black" type="submit">登录</button>
        </form>
      </section>
      <section class="section">
        <div class="row-between">
          <a class="text-btn" href="register.html">新商户注册</a>
          <button class="text-btn" type="button" data-toast="忘记密码仅展示入口">忘记密码</button>
        </div>
      </section>
    </main>
  </div>
  <div class="toast" data-toast-root hidden></div>
  <script src="../../assets/js/mock.js" defer></script>
</body>
</html>
