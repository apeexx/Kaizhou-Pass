<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>商家入驻申请 - 开州金厨商家端</title>
    <link rel="stylesheet" href="../../shared/theme.css">
    <link rel="stylesheet" href="../../shared/mobile-app.css">
  </head>
  <body class="app-preview-page">
    <div class="preview-layout">
      <div class="mobile-frame">
        <div class="screen">
          <div class="status-bar">
            <span>09:41</span>
            <span class="status-bar__capsule">商家入驻</span>
          </div>
          <header class="header header--compact">
            <a class="back-link" href="../index.html">返回封面</a>
            <h1 class="page-title">提交入驻资料</h1>
            <p class="page-subtitle">按真实手机端申请流程展示门店入驻所需的基础信息。</p>
          </header>
          <main class="content">
            <div class="steps" aria-label="入驻步骤">
              <span class="step-dot is-active">1</span>
              <span class="step-line"></span>
              <span class="step-dot">2</span>
              <span class="step-line"></span>
              <span class="step-dot">3</span>
            </div>

            <section class="hero-card hero-card--tight">
              <span class="eyebrow">开店申请</span>
              <h2 class="hero-title">让平台先了解你的门店</h2>
              <p class="hero-copy">当前页面只展示资料结构和流程，不做真实上传与接口校验。</p>
            </section>

            <section class="section">
              <div class="section-card">
                <div class="form-grid">
                  <div class="field">
                    <label>门店名称</label>
                    <span>开州金厨示范店</span>
                  </div>
                  <div class="field">
                    <label>经营类目</label>
                    <span>小炒快餐 / 川渝家常菜</span>
                  </div>
                  <div class="field">
                    <label>营业地址</label>
                    <span>开州区汉丰街道开州大道 88 号一层</span>
                  </div>
                  <div class="field">
                    <label>联系人与电话</label>
                    <span>张店长 · 138 0000 6666</span>
                  </div>
                  <div class="field">
                    <label>资质材料</label>
                    <span>营业执照、门头照、食品经营许可证、法人身份证</span>
                  </div>
                </div>
              </div>
            </section>

            <section class="section">
              <div class="notice-card">
                <div class="card-title-row">
                  <h3>提交后会发生什么</h3>
                  <span class="status-pill">预计 1 个工作日</span>
                </div>
                <p class="muted-note">平台会先审核门店资料完整性，再决定是否开通正式经营权限。</p>
              </div>
            </section>

            <section class="section">
              <div class="button-row">
                <button
                  class="button button--primary"
                  type="button"
                  data-submit-next="reviewing.html"
                  data-submit-message="资料已提交，进入审核流程"
                >
                  提交申请
                </button>
                <a class="button button--secondary" href="../index.html">稍后再看</a>
              </div>
            </section>
          </main>
        </div>
      </div>
    </div>
    <script src="../../shared/common.js"></script>
  </body>
</html>
