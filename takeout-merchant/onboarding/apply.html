<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>填写门店资料 - 开州金厨商家端</title>
    <link rel="stylesheet" href="../../shared/theme.css">
    <link rel="stylesheet" href="../../shared/mobile-app.css">
  </head>
  <body class="app-preview-page" data-demo-app="merchant" data-demo-scenario="apply">
    <div class="preview-layout">
      <div class="mobile-frame">
        <div class="screen">
          <div class="status-bar">
            <span>09:41</span>
            <span class="status-bar__capsule">门店入驻</span>
          </div>
          <header class="header">
            <a class="back-link" href="../index.html">返回登录页</a>
            <h1 class="page-title">填写门店资料</h1>
            <p class="page-subtitle">手机号 <span data-bind="phoneMasked"></span> 还没有商家档案，请先完成门店资料、证照和门头照片上传。</p>
          </header>
          <main class="content">
            <div class="steps" aria-label="商家入驻进度">
              <div class="step-item is-active">
                <span class="step-dot">1</span>
                <span class="step-label">填写资料</span>
              </div>
              <div class="step-item">
                <span class="step-dot">2</span>
                <span class="step-label">平台审核</span>
              </div>
              <div class="step-item">
                <span class="step-dot">3</span>
                <span class="step-label">开通门店</span>
              </div>
            </div>

            <section class="hero-card">
              <div class="support-strip">
                <span class="support-strip__icon">
                  <svg class="icon" aria-hidden="true"><use href="../../shared/icons.svg#icon-shield"></use></svg>
                </span>
                <div class="support-copy">
                  <strong>本页模拟真实开店资料页</strong>
                  <span>提交后会先进入审核中，再进入正式商家 App，而不是直接跳到展示首页。</span>
                </div>
              </div>
            </section>

            <section class="section-card section">
              <div class="section-heading">
                <h2>基础信息</h2>
                <span class="section-caption">示例内容用于演示流程</span>
              </div>
              <div class="field-stack">
                <label class="input-group">
                  <span>联系人姓名</span>
                  <input class="input-control" type="text" value="刘春梅">
                </label>
                <label class="input-group">
                  <span>联系手机号</span>
                  <input class="input-control" type="text" data-bind-value="phoneFull">
                </label>
                <label class="input-group">
                  <span>门店名称</span>
                  <input class="input-control" type="text" value="开州江湖小馆">
                </label>
                <label class="input-group">
                  <span>主营品类</span>
                  <select class="select-control">
                    <option>川渝家常菜 / 小炒 / 汤饭</option>
                    <option>盖饭简餐 / 炒饭炒面</option>
                    <option>火锅冒菜 / 麻辣烫</option>
                  </select>
                </label>
                <label class="input-group">
                  <span>门店地址</span>
                  <input class="input-control" type="text" value="重庆市开州区文峰街道盛山路 188 号">
                </label>
                <label class="input-group">
                  <span>营业时间</span>
                  <select class="select-control">
                    <option>09:00 - 22:30</option>
                    <option>08:00 - 21:00</option>
                    <option>10:00 - 24:00</option>
                  </select>
                </label>
              </div>
            </section>

            <section class="section-card section">
              <div class="section-heading">
                <h2>资质与照片</h2>
                <span class="section-caption">保留真实上传位</span>
              </div>
              <div class="upload-grid">
                <div class="upload-tile">
                  <span class="icon-badge icon-badge--soft">
                    <svg class="icon" aria-hidden="true"><use href="../../shared/icons.svg#icon-id-card"></use></svg>
                  </span>
                  <strong>营业执照</strong>
                  <span>上传营业执照或统一社会信用代码照片</span>
                </div>
                <div class="upload-tile">
                  <span class="icon-badge icon-badge--soft">
                    <svg class="icon" aria-hidden="true"><use href="../../shared/icons.svg#icon-camera"></use></svg>
                  </span>
                  <strong>门头与出餐照</strong>
                  <span>上传门店门头、后厨和打包环境照片</span>
                </div>
              </div>
              <p class="muted-note">这一步故意保留真实商家端常见字段，让演示时更像正常入驻流程。</p>
            </section>

            <section class="section button-row">
              <button
                class="button button--primary"
                type="button"
                data-submit-next="./reviewing.html"
                data-submit-message="门店资料已提交，正在进入审核流程"
                data-submit-scenario="reviewing"
              >
                提交入驻申请
              </button>
              <a class="button button--secondary" href="../index.html">回到登录页</a>
            </section>
          </main>
        </div>
      </div>
    </div>
    <script src="../../shared/common.js"></script>
  </body>
</html>
