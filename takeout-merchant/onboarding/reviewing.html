<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>审核中 - 开州金厨商家端</title>
    <link rel="stylesheet" href="../../shared/theme.css">
    <link rel="stylesheet" href="../../shared/mobile-app.css">
  </head>
  <body class="app-preview-page">
    <div class="preview-layout">
      <div class="mobile-frame">
        <div class="screen">
          <div class="status-bar">
            <span>09:41</span>
            <span class="status-bar__capsule">审核中</span>
          </div>
          <header class="header header--compact">
            <a class="back-link" href="./apply.html">返回申请页</a>
            <h1 class="page-title">平台审核中</h1>
            <p class="page-subtitle">这一页用来展示资料已提交后的等待状态和处理说明。</p>
          </header>
          <main class="content">
            <div class="steps" aria-label="入驻步骤">
              <span class="step-dot is-complete">1</span>
              <span class="step-line is-complete"></span>
              <span class="step-dot is-active">2</span>
              <span class="step-line"></span>
              <span class="step-dot">3</span>
            </div>

            <section class="hero-card hero-card--tight">
              <span class="eyebrow">已进入审核</span>
              <h2 class="hero-title">资料正在平台复核</h2>
              <p class="hero-copy">当前状态会重点核对门店资质、联系方式和配送经营范围。</p>
            </section>

            <section class="section">
              <div class="timeline-card">
                <div class="timeline">
                  <div class="timeline-item">
                    <span class="timeline-pin"></span>
                    <div>
                      <strong>资料已提交</strong>
                      <div class="meta-line">06-25 09:40 · 商家基础信息已进入平台队列</div>
                    </div>
                  </div>
                  <div class="timeline-item">
                    <span class="timeline-pin"></span>
                    <div>
                      <strong>等待人工审核</strong>
                      <div class="meta-line">建议保持电话畅通，便于平台回访确认</div>
                    </div>
                  </div>
                  <div class="timeline-item">
                    <span class="timeline-pin"></span>
                    <div>
                      <strong>通过后自动开通</strong>
                      <div class="meta-line">通过后即可直接进入商家端工作台</div>
                    </div>
                  </div>
                </div>
              </div>
            </section>

            <section class="section">
              <div class="button-row">
                <a class="button button--primary" href="./success.html">模拟审核通过</a>
                <a class="button button--secondary" href="../index.html">返回封面</a>
              </div>
            </section>
          </main>
        </div>
      </div>
    </div>
    <script src="../../shared/common.js"></script>
  </body>
</html>
