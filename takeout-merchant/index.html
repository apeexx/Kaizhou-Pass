<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>开州金厨商家端</title>
    <link rel="stylesheet" href="../shared/theme.css">
    <link rel="stylesheet" href="../shared/mobile-app.css">
  </head>
  <body class="app-preview-page">
    <div class="preview-layout">
      <div class="mobile-frame">
        <div class="screen">
          <div class="status-bar">
            <span>09:41</span>
            <span class="status-bar__capsule">商家端展示</span>
          </div>
          <header class="header">
            <h1 class="page-title">开州金厨商家端</h1>
            <p class="page-subtitle">围绕日常接单、备餐、商品维护和门店信息展示的静态 H5 原型。</p>
          </header>
          <main class="content content--cover">
            <section class="hero-card">
              <span class="eyebrow">门店经营体验</span>
              <h2 class="hero-title">一部手机看清今日经营节奏</h2>
              <p class="hero-copy">从提交入驻材料到正式接单，页面结构保持真实 App 的手机端浏览方式，适合直接展示平台体验。</p>
              <div class="hero-actions">
                <a class="button button--primary" href="./onboarding/apply.html">体验入驻流程</a>
                <a class="button button--secondary" href="./app/home.html">进入正式 App</a>
              </div>
            </section>

            <section class="section">
              <div class="section-heading">
                <h2>首批展示重点</h2>
                <span class="section-caption">只保留核心经营页面</span>
              </div>
              <div class="soft-grid">
                <div class="section-card">
                  <div class="card-title-row">
                    <h3>入驻流程</h3>
                    <span class="status-pill">申请 → 审核 → 开通</span>
                  </div>
                  <p class="muted-note">用三步页面展示从提交资料到开店成功的流程，不接真实接口。</p>
                </div>
                <div class="section-card">
                  <div class="card-title-row">
                    <h3>正式 App</h3>
                    <span class="status-pill">工作台 / 订单 / 商品 / 我的</span>
                  </div>
                  <p class="muted-note">底部 Tab 保持真实使用感，订单和商品页都带轻交互，方便汇报演示。</p>
                </div>
              </div>
            </section>
          </main>
        </div>
      </div>
    </div>
    <script src="../shared/common.js"></script>
  </body>
</html>
