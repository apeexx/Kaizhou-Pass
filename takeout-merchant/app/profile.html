<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>我的 - 开州金厨商家端</title>
    <link rel="stylesheet" href="../../shared/theme.css">
    <link rel="stylesheet" href="../../shared/mobile-app.css">
  </head>
  <body class="app-preview-page">
    <div class="preview-layout">
      <div class="mobile-frame">
        <div class="screen">
          <div class="status-bar">
            <span>09:41</span>
            <span class="status-bar__capsule">门店中心</span>
          </div>
          <header class="header">
            <h1 class="page-title">我的门店</h1>
            <p class="page-subtitle">集中展示店铺资料、营业时段和展示用账户信息。</p>
          </header>
          <main class="content">
            <section class="hero-card hero-card--tight">
              <span class="eyebrow">商家账号</span>
              <h2 class="hero-title">开州金厨示范店</h2>
              <p class="hero-copy">当前账号用于展示商家端静态页面，不涉及真实结算或平台权限接口。</p>
            </section>

            <section class="section">
              <div class="section-card">
                <div class="profile-list">
                  <div class="profile-item">
                    <div>
                      <strong>门店地址</strong>
                      <span>经营位置</span>
                    </div>
                    <span>开州大道 88 号一层</span>
                  </div>
                  <div class="profile-item">
                    <div>
                      <strong>营业时段</strong>
                      <span>午晚高峰</span>
                    </div>
                    <span>10:00 - 21:30</span>
                  </div>
                  <div class="profile-item">
                    <div>
                      <strong>联系人</strong>
                      <span>店铺负责人</span>
                    </div>
                    <span>张店长</span>
                  </div>
                  <div class="profile-item">
                    <div>
                      <strong>资料状态</strong>
                      <span>平台审核结果</span>
                    </div>
                    <span>已开通</span>
                  </div>
                </div>
              </div>
            </section>

            <section class="section">
              <div class="notice-card">
                <div class="card-title-row">
                  <h3>演示说明</h3>
                  <span class="status-pill">静态展示</span>
                </div>
                <p class="muted-note">本批次不扩展营销、退款、投诉和复杂经营统计页面，当前内容只保留正式经营的核心感受。</p>
              </div>
            </section>
          </main>
          <nav class="tab-bar" aria-label="商家端底部导航">
            <a class="tab-link" href="./home.html">
              <span class="tab-link__dot"></span>
              <span>工作台</span>
            </a>
            <a class="tab-link" href="./orders.html">
              <span class="tab-link__dot"></span>
              <span>订单</span>
            </a>
            <a class="tab-link" href="./products.html">
              <span class="tab-link__dot"></span>
              <span>商品</span>
            </a>
            <a class="tab-link is-active" href="./profile.html">
              <span class="tab-link__dot"></span>
              <span>我的</span>
            </a>
          </nav>
        </div>
      </div>
    </div>
    <script src="../../shared/common.js"></script>
  </body>
</html>
