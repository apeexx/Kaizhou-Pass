<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>厨师认证 - 开州金厨</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" href="data:,">
</head>
<body data-page="certification">
  <div class="app-shell">
    <header class="app-header">
      <div class="header-row">
        <div>
          <h1 class="header-title">厨师认证</h1>
          <p class="header-subtitle">用于展示个人资质和服务能力</p>
        </div>
        <a class="text-btn" href="profile.html">返回</a>
      </div>
    </header>

    <main class="main app-main">
      <section class="steps" aria-label="认证步骤" data-cert-steps>
        <button class="step is-active" type="button" data-cert-step="0">身份信息</button>
        <button class="step" type="button" data-cert-step="1">资质证件</button>
        <button class="step" type="button" data-cert-step="2">服务能力</button>
        <button class="step" type="button" data-cert-step="3">提交审核</button>
      </section>

      <form class="section form-card form-grid" data-cert-wizard>
        <section class="cert-panel" data-cert-panel>
          <div class="field">
            <label for="real-name">真实姓名</label>
            <input id="real-name" value="李师傅">
          </div>
          <div class="field">
            <label for="cert-phone">手机号</label>
            <input id="cert-phone" inputmode="tel" value="138****6688">
          </div>
          <div class="field">
            <label for="city">服务城市</label>
            <select id="city">
              <option>重庆市开州区</option>
              <option>重庆市万州区</option>
            </select>
          </div>
          <div class="field">
            <label for="specialty">擅长菜系</label>
            <textarea id="specialty">川渝家常菜、宴席菜、养生汤、儿童餐</textarea>
          </div>
        </section>

        <section class="cert-panel" data-cert-panel hidden>
          <div class="upload-grid">
            <button class="upload-card" type="button" data-upload-demo>
              <strong class="item-title">身份证明</strong>
              <span class="item-subtitle">点击贴图</span>
            </button>
            <button class="upload-card" type="button" data-upload-demo>
              <strong class="item-title">健康证</strong>
              <span class="item-subtitle">点击贴图</span>
            </button>
            <button class="upload-card" type="button" data-upload-demo>
              <strong class="item-title">厨师证</strong>
              <span class="item-subtitle">可选贴图</span>
            </button>
            <button class="upload-card" type="button" data-upload-demo>
              <strong class="item-title">作品照片</strong>
              <span class="item-subtitle">展示成品菜</span>
            </button>
          </div>
        </section>

        <section class="cert-panel" data-cert-panel hidden>
          <div class="field">
            <label for="service-area">服务范围</label>
            <textarea id="service-area">开州城区及周边 15 公里，可承接家庭聚餐、生日宴、商务小聚。</textarea>
          </div>
          <div class="field">
            <label for="service-time">可服务时间</label>
            <select id="service-time">
              <option>午餐和晚餐均可预约</option>
              <option>仅晚餐可预约</option>
              <option>周末优先</option>
            </select>
          </div>
          <div class="chips service-tags">
            <button class="chip is-active" type="button" data-toast="服务标签已选择演示">家宴</button>
            <button class="chip is-active" type="button" data-toast="服务标签已选择演示">宴席</button>
            <button class="chip" type="button" data-toast="服务标签已选择演示">儿童餐</button>
            <button class="chip" type="button" data-toast="服务标签已选择演示">养生汤</button>
          </div>
        </section>

        <section class="cert-panel" data-cert-panel hidden>
          <div class="summary-card">
            <strong class="item-title">提交前确认</strong>
            <span class="item-subtitle">李师傅 · 重庆市开州区 · 川渝家常菜、宴席菜、养生汤、儿童餐</span>
            <div class="detail-grid">
              <div class="detail"><span>资料</span><strong data-upload-count>0/4 已贴图</strong></div>
              <div class="detail"><span>服务</span><strong>城区 15 公里</strong></div>
            </div>
          </div>
        </section>

        <div class="actions cert-actions">
          <button class="btn ghost" type="button" data-cert-prev hidden>上一步</button>
          <button class="btn" type="button" data-cert-next>下一步</button>
          <button class="btn" type="submit" data-cert-submit hidden>提交认证</button>
        </div>
      </form>
    </main>

    <nav class="bottom-nav" aria-label="底部导航">
      <a class="nav-item" data-nav="index" href="index.html"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/><path d="M9 20v-6h6v6"/></svg><span>首页</span></a>
      <a class="nav-item" data-nav="messages" href="messages.html"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 5h16v11H8l-4 4V5Z"/><path d="M8 9h8M8 13h5"/></svg><span>消息</span></a>
      <a class="nav-item" data-nav="dishes" href="dishes.html"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 3v8M10 3v8M6 7h4"/><path d="M8 11v10"/><path d="M16 3c2 2 3 4 3 7v11"/><path d="M15 10h4"/></svg><span>菜品</span></a>
      <a class="nav-item" data-nav="wallet" href="wallet.html"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 7h16v12H4z"/><path d="M16 11h4v4h-4z"/><path d="M6 7l2-3h8l2 3"/></svg><span>收钱</span></a>
      <a class="nav-item" data-nav="profile" href="profile.html"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 12a4 4 0 1 0 0-8 4 4 0 0 0 0 8Z"/><path d="M4 21a8 8 0 0 1 16 0"/></svg><span>我的</span></a>
    </nav>
  </div>
  <div class="toast" data-toast-root hidden></div>
  <script src="app.js" defer></script>
</body>
</html>
