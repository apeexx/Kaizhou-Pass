<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>厨师认证 - 开州金厨</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" href="data:,">
</head>
<body data-page="certification">
  <div class="app-shell">
    <header class="app-header">
      <div class="header-row">
        <div>
          <h1 class="header-title">厨师认证</h1>
          <p class="header-subtitle">用于展示个人资质和服务能力</p>
        </div>
        <a class="text-btn" href="profile.html">返回</a>
      </div>
    </header>

    <main class="main app-main">
      <section class="steps" aria-label="认证步骤">
        <span class="step is-active">身份信息</span>
        <span class="step">资质证件</span>
        <span class="step">服务能力</span>
        <span class="step">提交审核</span>
      </section>

      <form class="section form-card form-grid" data-demo-form data-success="认证提交演示">
        <div class="field">
          <label for="real-name">真实姓名</label>
          <input id="real-name" value="李师傅">
        </div>
        <div class="field">
          <label for="cert-phone">手机号</label>
          <input id="cert-phone" inputmode="tel" value="138****6688">
        </div>
        <div class="field">
          <label for="city">服务城市</label>
          <select id="city">
            <option>重庆市开州区</option>
            <option>重庆市万州区</option>
          </select>
        </div>
        <div class="field">
          <label for="specialty">擅长菜系</label>
          <textarea id="specialty">川渝家常菜、宴席菜、养生汤、儿童餐</textarea>
        </div>

        <div class="upload-grid">
          <button class="upload-card" type="button" data-toast="身份证明上传演示">
            <strong class="item-title">身份证明</strong>
            <span class="item-subtitle">点击上传照片</span>
          </button>
          <button class="upload-card" type="button" data-toast="健康证上传演示">
            <strong class="item-title">健康证</strong>
            <span class="item-subtitle">点击上传照片</span>
          </button>
          <button class="upload-card" type="button" data-toast="厨师证上传演示">
            <strong class="item-title">厨师证</strong>
            <span class="item-subtitle">可选上传</span>
          </button>
          <button class="upload-card" type="button" data-toast="作品照片上传演示">
            <strong class="item-title">作品照片</strong>
            <span class="item-subtitle">展示成品菜</span>
          </button>
        </div>

        <button class="btn" type="submit">提交认证</button>
      </form>
    </main>

    <nav class="bottom-nav" aria-label="底部导航">
      <a class="nav-item" data-nav="index" href="index.html"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/><path d="M9 20v-6h6v6"/></svg><span>首页</span></a>
      <a class="nav-item" data-nav="messages" href="messages.html"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 5h16v11H8l-4 4V5Z"/><path d="M8 9h8M8 13h5"/></svg><span>消息</span></a>
      <a class="nav-item" data-nav="dishes" href="dishes.html"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 3v8M10 3v8M6 7h4"/><path d="M8 11v10"/><path d="M16 3c2 2 3 4 3 7v11"/><path d="M15 10h4"/></svg><span>菜品</span></a>
      <a class="nav-item" data-nav="wallet" href="wallet.html"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 7h16v12H4z"/><path d="M16 11h4v4h-4z"/><path d="M6 7l2-3h8l2 3"/></svg><span>收钱</span></a>
      <a class="nav-item" data-nav="profile" href="profile.html"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 12a4 4 0 1 0 0-8 4 4 0 0 0 0 8Z"/><path d="M4 21a8 8 0 0 1 16 0"/></svg><span>我的</span></a>
    </nav>
  </div>
  <div class="toast" data-toast-root hidden></div>
  <script src="app.js" defer></script>
</body>
</html>
