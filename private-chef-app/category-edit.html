<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>编辑分类 - 开州金厨</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" href="data:,">
</head>
<body class="theme-commerce" data-page="categories">
  <div class="app-shell">
    <header class="app-header">
      <div class="header-row">
        <div>
          <h1 class="header-title" data-edit-title>编辑分类</h1>
          <p class="header-subtitle">维护分类名称、图标和展示状态</p>
        </div>
        <a class="text-btn" href="categories.html">返回</a>
      </div>
    </header>

    <main class="main app-main">
      <form class="form-card form-grid" data-demo-form data-success="分类信息保存演示">
        <div class="field">
          <label for="category-name">分类名称</label>
          <input id="category-name" value="家常菜">
        </div>
        <div class="field">
          <label for="category-desc">分类介绍</label>
          <textarea id="category-desc">适合家庭日常上门服务，口味稳定，老人和儿童都容易接受。</textarea>
        </div>
        <div class="field">
          <label>分类图标</label>
          <div class="category-icon-picker" data-category-icon-picker>
            <button class="category-icon is-picked" type="button" data-icon-text="家">家</button>
            <button class="category-icon" type="button" data-icon-text="宴">宴</button>
            <button class="category-icon" type="button" data-icon-text="汤">汤</button>
            <button class="category-icon" type="button" data-icon-text="素">素</button>
          </div>
        </div>
        <div class="form-two">
          <div class="field">
            <label for="category-count">菜品数量</label>
            <input id="category-count" inputmode="numeric" value="12">
          </div>
          <div class="field">
            <label for="category-status">展示状态</label>
            <select id="category-status">
              <option>已启用</option>
              <option>待完善</option>
              <option>已隐藏</option>
            </select>
          </div>
        </div>
        <button class="btn" type="submit">保存分类</button>
      </form>
    </main>

    <nav class="bottom-nav" aria-label="底部导航">
      <a class="nav-item" data-nav="index" href="index.html"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/><path d="M9 20v-6h6v6"/></svg><span>首页</span></a>
      <a class="nav-item" data-nav="messages" href="messages.html"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 5h16v11H8l-4 4V5Z"/><path d="M8 9h8M8 13h5"/></svg><span>消息</span></a>
      <a class="nav-item" data-nav="dishes" href="dishes.html"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 3v8M10 3v8M6 7h4"/><path d="M8 11v10"/><path d="M16 3c2 2 3 4 3 7v11"/><path d="M15 10h4"/></svg><span>菜品</span></a>
      <a class="nav-item" data-nav="wallet" href="wallet.html"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 7h16v12H4z"/><path d="M16 11h4v4h-4z"/><path d="M6 7l2-3h8l2 3"/></svg><span>收钱</span></a>
      <a class="nav-item" data-nav="profile" href="profile.html"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 12a4 4 0 1 0 0-8 4 4 0 0 0 0 8Z"/><path d="M4 21a8 8 0 0 1 16 0"/></svg><span>我的</span></a>
    </nav>
  </div>
  <div class="toast" data-toast-root hidden></div>
  <script src="app.js" defer></script>
</body>
</html>
