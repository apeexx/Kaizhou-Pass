<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>收钱 - 开州金厨</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" href="data:,">
</head>
<body class="theme-commerce" data-page="wallet">
  <div class="app-shell">
    <header class="app-header">
      <div class="header-row">
        <div>
          <h1 class="header-title">收钱</h1>
          <p class="header-subtitle">查看收入、待结算和收款码</p>
        </div>
        <button class="icon-btn" type="button" data-toast="账单导出演示" aria-label="账单导出">
          <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true"><path d="M12 3v12" fill="none" stroke="currentColor" stroke-width="2"/><path d="M7 10l5 5 5-5" fill="none" stroke="currentColor" stroke-width="2"/><path d="M5 21h14" fill="none" stroke="currentColor" stroke-width="2"/></svg>
        </button>
      </div>
    </header>

    <main class="main app-main">
      <section class="stats-grid">
        <div class="stat-card"><span class="stat-label">今日收入</span><strong class="stat-value">¥1,286</strong><span class="stat-trend">3 场服务</span></div>
        <div class="stat-card"><span class="stat-label">可提现</span><strong class="stat-value">¥8,420</strong><span class="stat-trend">可申请</span></div>
        <div class="stat-card"><span class="stat-label">待结算</span><strong class="stat-value">¥2,160</strong><span class="stat-trend">服务确认后入账</span></div>
        <div class="stat-card"><span class="stat-label">本月收入</span><strong class="stat-value">¥28,760</strong><span class="stat-trend">较上月 +12%</span></div>
      </section>

      <section class="section wallet-qr">
        <div>
          <h2 class="section-title">收款码</h2>
          <p class="section-note">用于现场补收加菜、加时等费用演示</p>
        </div>
        <div class="qr-box" aria-label="静态收款码示意"><span class="qr-logo">金</span></div>
        <div class="actions">
          <button class="btn" type="button" data-toast="收款码打开演示">收款码</button>
          <button class="btn secondary" type="button" data-toast="提现申请演示">提现</button>
        </div>
      </section>

      <section class="section">
        <div class="section-header">
          <h2 class="section-title">账单明细</h2>
          <button class="text-btn" type="button" data-toast="筛选账单演示">筛选</button>
        </div>
        <div class="bill-list">
          <div class="bill-row">
            <span><strong class="item-title">周女士家宴服务</strong><span class="item-subtitle">今日 18:30 · 服务费</span></span>
            <strong class="price">+¥688</strong>
          </div>
          <div class="bill-row">
            <span><strong class="item-title">商务小聚加菜</strong><span class="item-subtitle">今日 12:00 · 现场确认</span></span>
            <strong class="price">+¥128</strong>
          </div>
          <div class="bill-row">
            <span><strong class="item-title">提现申请</strong><span class="item-subtitle">昨日 20:18 · 处理中</span></span>
            <strong>¥2,000</strong>
          </div>
        </div>
      </section>
    </main>

    <nav class="bottom-nav" aria-label="底部导航">
      <a class="nav-item" data-nav="index" href="index.html"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/><path d="M9 20v-6h6v6"/></svg><span>首页</span></a>
      <a class="nav-item" data-nav="messages" href="messages.html"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 5h16v11H8l-4 4V5Z"/><path d="M8 9h8M8 13h5"/></svg><span>消息</span></a>
      <a class="nav-item" data-nav="dishes" href="dishes.html"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 3v8M10 3v8M6 7h4"/><path d="M8 11v10"/><path d="M16 3c2 2 3 4 3 7v11"/><path d="M15 10h4"/></svg><span>菜品</span></a>
      <a class="nav-item" data-nav="wallet" href="wallet.html"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 7h16v12H4z"/><path d="M16 11h4v4h-4z"/><path d="M6 7l2-3h8l2 3"/></svg><span>收钱</span></a>
      <a class="nav-item" data-nav="profile" href="profile.html"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 12a4 4 0 1 0 0-8 4 4 0 0 0 0 8Z"/><path d="M4 21a8 8 0 0 1 16 0"/></svg><span>我的</span></a>
    </nav>
  </div>
  <div class="toast" data-toast-root hidden></div>
  <script src="app.js" defer></script>
</body>
</html>
