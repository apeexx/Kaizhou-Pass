<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>登录开州金厨 - 私厨前台端</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" href="data:,">
</head>
<body class="theme-commerce" data-page="login">
  <div class="app-shell">
    <header class="app-header is-plain">
      <div class="brand-lockup">
        <span class="brand-mark">金</span>
        <div>
          <h1 class="header-title">登录开州金厨</h1>
          <p class="header-subtitle">进入你的私厨前台管理端</p>
        </div>
      </div>
    </header>

    <main class="main app-main">
      <section class="hero-panel with-photo" style="--hero-image: url('assets/images/chinese-set-lunch.jpg')">
        <p class="section-note">厨师本人使用</p>
        <h2 class="section-title">查看指定预约、维护菜品、处理收钱</h2>
      </section>

      <section class="section">
        <div class="segmented">
          <button class="segment is-active" type="button" data-switch-login="code">验证码登录</button>
          <button class="segment" type="button" data-switch-login="password">密码登录</button>
        </div>

        <form class="form-card form-grid" data-demo-form data-success="登录成功演示">
          <div data-login-panel="code">
            <div class="form-grid">
              <div class="field">
                <label for="phone-code">手机号</label>
                <input id="phone-code" inputmode="tel" placeholder="请输入手机号">
              </div>
              <div class="field">
                <label for="verify-code">验证码</label>
                <input id="verify-code" inputmode="numeric" placeholder="请输入验证码">
              </div>
              <button class="btn secondary" type="button" data-toast="验证码发送演示">获取验证码</button>
            </div>
          </div>
          <div data-login-panel="password" hidden>
            <div class="form-grid">
              <div class="field">
                <label for="phone-password">手机号</label>
                <input id="phone-password" inputmode="tel" placeholder="请输入手机号">
              </div>
              <div class="field">
                <label for="password">密码</label>
                <input id="password" type="password" placeholder="请输入密码">
              </div>
            </div>
          </div>
          <label class="agreement">
            <input type="checkbox">
            <span>我已阅读并同意用户协议和隐私政策，理解本页面仅为静态演示。</span>
          </label>
          <button class="btn" type="submit">登录 / 注册</button>
        </form>
      </section>

      <section class="section">
        <a class="menu-row" href="certification.html">
          <span class="row-left"><span class="row-icon">证</span><span><strong class="item-title">先去厨师认证</strong><span class="item-subtitle">完善身份和服务能力资料</span></span></span>
          <span class="chevron">›</span>
        </a>
        <a class="menu-row" href="profile.html">
          <span class="row-left"><span class="row-icon">我</span><span><strong class="item-title">返回个人页</strong><span class="item-subtitle">查看账号、服务范围和帮助入口</span></span></span>
          <span class="chevron">›</span>
        </a>
      </section>
    </main>
  </div>
  <div class="toast" data-toast-root hidden></div>
  <script src="app.js" defer></script>
</body>
</html>
