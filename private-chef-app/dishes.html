<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>我的菜品 - 开州金厨</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" href="data:,">
</head>
<body data-page="dishes">
  <div class="app-shell">
    <header class="app-header">
      <div class="header-row">
        <div>
          <h1 class="header-title">我的菜品</h1>
          <p class="header-subtitle">维护客户指定你时可选择的菜品</p>
        </div>
        <a class="btn" href="dish-edit.html?mode=new">新增</a>
      </div>
    </header>

    <main class="main app-main">
      <section class="section">
        <div class="chips" data-filter-group data-filter-target="[data-dish-card]" data-empty-target="#dish-empty">
          <button class="chip is-active" type="button" data-filter="all">全部</button>
          <button class="chip" type="button" data-filter="家常菜">家常菜</button>
          <button class="chip" type="button" data-filter="宴席菜">宴席菜</button>
          <button class="chip" type="button" data-filter="川渝菜">川渝菜</button>
          <button class="chip" type="button" data-filter="养生汤">养生汤</button>
        </div>
      </section>

      <section class="dish-list" aria-label="菜品列表">
        <article class="dish-card" data-dish-card data-type="川渝菜">
          <span class="food-thumb" aria-hidden="true"></span>
          <div class="dish-content">
            <div class="item-top"><strong class="item-title">开州酸菜鱼</strong><span class="badge green">已上架</span></div>
            <span class="item-subtitle">适合 4-8 人，酸辣可调，支持老人少辣版本</span>
            <div class="item-top" style="margin-top:10px;"><span class="price">¥168 / 道</span><span class="badge">川渝菜</span></div>
            <div class="actions">
              <a class="btn secondary" href="dish-edit.html?dish=fish">编辑</a>
              <button class="btn ghost" type="button" data-dish-toggle>下架</button>
            </div>
          </div>
        </article>

        <article class="dish-card" data-dish-card data-type="宴席菜">
          <span class="food-thumb feast" aria-hidden="true"></span>
          <div class="dish-content">
            <div class="item-top"><strong class="item-title">宴席扣碗组合</strong><span class="badge green">已上架</span></div>
            <span class="item-subtitle">适合生日宴和家庭聚餐，可搭配热菜小炒</span>
            <div class="item-top" style="margin-top:10px;"><span class="price">¥238 / 组</span><span class="badge">宴席菜</span></div>
            <div class="actions">
              <a class="btn secondary" href="dish-edit.html?dish=feast">编辑</a>
              <button class="btn ghost" type="button" data-dish-toggle>下架</button>
            </div>
          </div>
        </article>

        <article class="dish-card" data-dish-card data-type="养生汤">
          <span class="food-thumb soup" aria-hidden="true"></span>
          <div class="dish-content">
            <div class="item-top"><strong class="item-title">菌菇鸡汤</strong><span class="badge amber">待完善</span></div>
            <span class="item-subtitle">适合老人和儿童，可提前沟通忌口</span>
            <div class="item-top" style="margin-top:10px;"><span class="price">¥98 / 盅</span><span class="badge">养生汤</span></div>
            <div class="actions">
              <a class="btn secondary" href="dish-edit.html?dish=soup">编辑</a>
              <button class="btn" type="button" data-dish-toggle>上架</button>
            </div>
          </div>
        </article>

        <article class="dish-card" data-dish-card data-type="家常菜">
          <span class="food-thumb feast" aria-hidden="true"></span>
          <div class="dish-content">
            <div class="item-top"><strong class="item-title">番茄牛腩</strong><span class="badge green">已上架</span></div>
            <span class="item-subtitle">温和口味，适合家庭日常餐</span>
            <div class="item-top" style="margin-top:10px;"><span class="price">¥128 / 道</span><span class="badge">家常菜</span></div>
            <div class="actions">
              <a class="btn secondary" href="dish-edit.html?dish=beef">编辑</a>
              <button class="btn ghost" type="button" data-dish-toggle>下架</button>
            </div>
          </div>
        </article>
      </section>
      <div id="dish-empty" class="empty-state" hidden>当前分类暂无菜品</div>

      <section class="section">
        <a class="menu-row" href="categories.html">
          <span class="row-left"><span class="row-icon">类</span><span><strong class="item-title">菜品分类</strong><span class="item-subtitle">维护分类名称和排序</span></span></span>
          <span class="chevron">›</span>
        </a>
      </section>
    </main>

    <nav class="bottom-nav" aria-label="底部导航">
      <a class="nav-item" data-nav="index" href="index.html"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/><path d="M9 20v-6h6v6"/></svg><span>首页</span></a>
      <a class="nav-item" data-nav="messages" href="messages.html"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 5h16v11H8l-4 4V5Z"/><path d="M8 9h8M8 13h5"/></svg><span>消息</span></a>
      <a class="nav-item" data-nav="dishes" href="dishes.html"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 3v8M10 3v8M6 7h4"/><path d="M8 11v10"/><path d="M16 3c2 2 3 4 3 7v11"/><path d="M15 10h4"/></svg><span>菜品</span></a>
      <a class="nav-item" data-nav="wallet" href="wallet.html"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 7h16v12H4z"/><path d="M16 11h4v4h-4z"/><path d="M6 7l2-3h8l2 3"/></svg><span>收钱</span></a>
      <a class="nav-item" data-nav="profile" href="profile.html"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 12a4 4 0 1 0 0-8 4 4 0 0 0 0 8Z"/><path d="M4 21a8 8 0 0 1 16 0"/></svg><span>我的</span></a>
    </nav>
  </div>
  <div class="toast" data-toast-root hidden></div>
  <script src="app.js" defer></script>
</body>
</html>
