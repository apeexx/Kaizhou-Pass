<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>开州金厨骑手端</title>
    <link rel="stylesheet" href="../shared/theme.css">
    <link rel="stylesheet" href="../shared/mobile-app.css">
  </head>
  <body class="app-preview-page">
    <div class="preview-layout">
      <div class="mobile-frame">
        <div class="screen">
          <div class="status-bar">
            <span>09:41</span>
            <span class="status-bar__capsule">骑手端展示</span>
          </div>
          <header class="header">
            <h1 class="page-title">开州金厨骑手端</h1>
            <p class="page-subtitle">围绕接单、取货、配送和收入浏览设计的独立静态 H5 演示 App。</p>
          </header>
          <main class="content content--cover">
            <section class="hero-card">
              <span class="eyebrow">配送执行体验</span>
              <h2 class="hero-title">从入驻到送达都保持手机端节奏</h2>
              <p class="hero-copy">骑手端和商家端完全独立打开，页面只展示各自流程，不提供跨端入口。</p>
              <div class="hero-actions">
                <a class="button button--primary" href="./onboarding/apply.html">体验入驻流程</a>
                <a class="button button--secondary" href="./app/home.html">进入正式 App</a>
              </div>
            </section>

            <section class="section">
              <div class="soft-grid">
                <div class="section-card">
                  <div class="card-title-row">
                    <h3>入驻展示</h3>
                    <span class="status-pill">申请 / 审核 / 成功</span>
                  </div>
                  <p class="muted-note">先展示骑手提交资料和等待审核，再衔接到正式配送场景。</p>
                </div>
                <div class="section-card">
                  <div class="card-title-row">
                    <h3>正式 App</h3>
                    <span class="status-pill">首页 / 接单 / 收入 / 我的</span>
                  </div>
                  <p class="muted-note">重点展示在线状态、接单大厅、配送详情和收入筛选几个核心画面。</p>
                </div>
              </div>
            </section>
          </main>
        </div>
      </div>
    </div>
    <script src="../shared/common.js"></script>
  </body>
</html>
