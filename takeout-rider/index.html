<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>骑手登录 - 开州金厨</title>
    <link rel="stylesheet" href="../shared/theme.css">
    <link rel="stylesheet" href="../shared/mobile-app.css">
  </head>
  <body class="app-preview-page" data-demo-app="rider">
    <div class="preview-layout">
      <div class="mobile-frame">
        <div class="screen">
          <div class="status-bar">
            <span>09:41</span>
            <span class="status-bar__capsule">骑手登录</span>
          </div>
          <main class="content content--cover">
            <section class="login-brand login-brand--compact">
              <span class="brand-mark">
                <svg class="icon" aria-hidden="true"><use href="../shared/icons.svg#icon-rider"></use></svg>
              </span>
              <div class="brand-copy">
                <strong>开州金厨骑手端</strong>
                <span>骑手登录</span>
              </div>
            </section>

            <section class="auth-card" data-auth-form data-auth-app="rider">
              <div class="login-shell">
                <label class="input-group">
                  <span>手机号码</span>
                  <input class="input-control" type="tel" inputmode="numeric" maxlength="11" placeholder="请选择或输入手机号" data-auth-phone list="rider-account-list">
                </label>
                <datalist id="rider-account-list">
                  <option value="13900000001">已认证骑手账号</option>
                  <option value="13900000002">审核中骑手账号</option>
                </datalist>

                <div class="input-group">
                  <label>短信验证码</label>
                  <div class="input-row">
                    <input class="input-control" type="tel" inputmode="numeric" maxlength="6" placeholder="请输入 6 位验证码" data-auth-code>
                    <button class="sms-button" type="button" data-send-code>获取验证码</button>
                  </div>
                </div>

                <div class="demo-grid">
                  <button class="demo-option" type="button" data-auth-demo data-demo-phone="13900000001" data-demo-code="246810" aria-pressed="false">
                    <strong>已认证骑手</strong>
                    <span>点击后直接填入手机号和验证码</span>
                  </button>
                  <button class="demo-option" type="button" data-auth-demo data-demo-phone="13900000002" data-demo-code="246810" aria-pressed="false">
                    <strong>审核中骑手</strong>
                    <span>点击后直接填入手机号和验证码</span>
                  </button>
                </div>

                <div class="login-note">手机号支持点击输入框后直接从下拉中选择，验证码固定为 246810。</div>

                <div class="check-line">
                  <button class="checkbox" type="button" data-agree-toggle data-checked="false" aria-checked="false">
                  <svg class="icon" aria-hidden="true"><use href="../shared/icons.svg#icon-check"></use></svg>
                  </button>
                  <span>我已阅读并同意《开州金厨骑手服务协议》与《隐私说明》。</span>
                </div>

                <div class="login-actions">
                  <button class="button button--primary" type="button" data-auth-submit>登录</button>
                </div>
              </div>
            </section>
          </main>
        </div>
      </div>
    </div>
    <script src="../shared/common.js"></script>
  </body>
</html>
