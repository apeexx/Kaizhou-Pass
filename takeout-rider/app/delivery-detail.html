<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>配送详情 - 开州金厨骑手端</title>
    <link rel="stylesheet" href="../../shared/theme.css">
    <link rel="stylesheet" href="../../shared/mobile-app.css">
  </head>
  <body class="app-preview-page">
    <div class="preview-layout">
      <div class="mobile-frame">
        <div class="screen">
          <div class="status-bar">
            <span>09:41</span>
            <span class="status-bar__capsule">配送详情</span>
          </div>
          <header class="header header--compact">
            <a class="back-link" href="./hall.html">返回接单大厅</a>
            <h1 class="page-title">配送任务 #PS20260625018</h1>
            <p class="page-subtitle">通过一个按钮在取货中、配送中、已送达之间循环切换。</p>
          </header>
          <main class="content">
            <section
              class="hero-card"
              data-cycle-control
              data-cycle-values="取货中|配送中|已送达"
              data-cycle-notes="正在前往商家取餐，建议核对订单号后再出发。|餐品已取到，当前路线以用户地址为主。|订单已送达，再次点击可回到取货中演示起始状态。"
              data-cycle-classes="status-pickup|status-online|status-complete"
            >
              <span class="eyebrow">配送状态</span>
              <h2 class="hero-title">当前为 <span class="status-value" data-cycle-value>取货中</span></h2>
              <p class="hero-copy" data-cycle-note>正在前往商家取餐，建议核对订单号后再出发。</p>
              <div class="card-actions">
                <button class="button button--small button--primary" type="button" data-cycle-trigger data-cycle-prefix="切换为">切换为配送中</button>
              </div>
            </section>

            <section class="section">
              <div class="detail-grid">
                <div class="detail-card">
                  <h3>商家信息</h3>
                  <ul class="detail-list">
                    <li><span>门店</span><span>开州金厨示范店</span></li>
                    <li><span>取餐地址</span><span>开州大道 88 号一层</span></li>
                    <li><span>联系电话</span><span>138 0000 6666</span></li>
                  </ul>
                </div>
                <div class="detail-card">
                  <h3>用户信息</h3>
                  <ul class="detail-list">
                    <li><span>收货人</span><span>王女士</span></li>
                    <li><span>送达地址</span><span>滨湖中路 18 号 2 栋</span></li>
                    <li><span>配送时限</span><span>16 分钟</span></li>
                  </ul>
                </div>
                <div class="detail-card">
                  <h3>配送说明</h3>
                  <p class="muted-note">当前原型不做地图与定位深度功能，只保留路线规则和状态切换的展示感。</p>
                </div>
              </div>
            </section>
          </main>
          <nav class="tab-bar" aria-label="骑手端底部导航">
            <a class="tab-link" href="./home.html">
              <span class="tab-link__dot"></span>
              <span>首页</span>
            </a>
            <a class="tab-link is-active" href="./hall.html">
              <span class="tab-link__dot"></span>
              <span>接单</span>
            </a>
            <a class="tab-link" href="./earnings.html">
              <span class="tab-link__dot"></span>
              <span>收入</span>
            </a>
            <a class="tab-link" href="./profile.html">
              <span class="tab-link__dot"></span>
              <span>我的</span>
            </a>
          </nav>
        </div>
      </div>
    </div>
    <script src="../../shared/common.js"></script>
  </body>
</html>
