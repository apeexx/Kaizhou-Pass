<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>我的 - 开州金厨骑手端</title>
    <link rel="stylesheet" href="../../shared/theme.css">
    <link rel="stylesheet" href="../../shared/mobile-app.css">
  </head>
  <body class="app-preview-page">
    <div class="preview-layout">
      <div class="mobile-frame">
        <div class="screen">
          <div class="status-bar">
            <span>09:41</span>
            <span class="status-bar__capsule">骑手中心</span>
          </div>
          <header class="header">
            <h1 class="page-title">我的资料</h1>
            <p class="page-subtitle">用个人资料、配送偏好和演示说明组成骑手端的个人中心页面。</p>
          </header>
          <main class="content">
            <section class="hero-card hero-card--tight">
              <span class="eyebrow">骑手账号</span>
              <h2 class="hero-title">李骑手</h2>
              <p class="hero-copy">本页只保留展示所需资料，不包含真实提现、站点和奖惩模块。</p>
            </section>

            <section class="section">
              <div class="section-card">
                <div class="profile-list">
                  <div class="profile-item">
                    <div>
                      <strong>常驻区域</strong>
                      <span>配送范围</span>
                    </div>
                    <span>汉丰街道 / 滨湖片区</span>
                  </div>
                  <div class="profile-item">
                    <div>
                      <strong>交通工具</strong>
                      <span>当前班次</span>
                    </div>
                    <span>电动车</span>
                  </div>
                  <div class="profile-item">
                    <div>
                      <strong>接单状态</strong>
                      <span>页面演示状态</span>
                    </div>
                    <span>在线接单</span>
                  </div>
                  <div class="profile-item">
                    <div>
                      <strong>资料状态</strong>
                      <span>审核结果</span>
                    </div>
                    <span>已开通</span>
                  </div>
                </div>
              </div>
            </section>

            <section class="section">
              <div class="notice-card">
                <div class="card-title-row">
                  <h3>首批保留范围</h3>
                  <span class="status-pill">核心配送</span>
                </div>
                <p class="muted-note">当前版本不延伸到站点管理、等级、打赏、异常规则和复杂运营页，只突出接单与配送主流程。</p>
              </div>
            </section>
          </main>
          <nav class="tab-bar" aria-label="骑手端底部导航">
            <a class="tab-link" href="./home.html">
              <span class="tab-link__dot"></span>
              <span>首页</span>
            </a>
            <a class="tab-link" href="./hall.html">
              <span class="tab-link__dot"></span>
              <span>接单</span>
            </a>
            <a class="tab-link" href="./earnings.html">
              <span class="tab-link__dot"></span>
              <span>收入</span>
            </a>
            <a class="tab-link is-active" href="./profile.html">
              <span class="tab-link__dot"></span>
              <span>我的</span>
            </a>
          </nav>
        </div>
      </div>
    </div>
    <script src="../../shared/common.js"></script>
  </body>
</html>
