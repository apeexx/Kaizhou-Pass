<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>骑手入驻申请 - 开州金厨骑手端</title>
    <link rel="stylesheet" href="../../shared/theme.css">
    <link rel="stylesheet" href="../../shared/mobile-app.css">
  </head>
  <body class="app-preview-page">
    <div class="preview-layout">
      <div class="mobile-frame">
        <div class="screen">
          <div class="status-bar">
            <span>09:41</span>
            <span class="status-bar__capsule">骑手入驻</span>
          </div>
          <header class="header header--compact">
            <a class="back-link" href="../index.html">返回封面</a>
            <h1 class="page-title">提交骑手资料</h1>
            <p class="page-subtitle">首批页面只展示骑手入驻所需的信息结构和流转状态。</p>
          </header>
          <main class="content">
            <div class="steps" aria-label="入驻步骤">
              <span class="step-dot is-active">1</span>
              <span class="step-line"></span>
              <span class="step-dot">2</span>
              <span class="step-line"></span>
              <span class="step-dot">3</span>
            </div>

            <section class="hero-card hero-card--tight">
              <span class="eyebrow">骑手申请</span>
              <h2 class="hero-title">先把基础配送能力交给平台审核</h2>
              <p class="hero-copy">本页不做真实实名认证与证件上传，只保留展示所需字段。</p>
            </section>

            <section class="section">
              <div class="section-card">
                <div class="form-grid">
                  <div class="field">
                    <label>姓名</label>
                    <span>李骑手</span>
                  </div>
                  <div class="field">
                    <label>联系电话</label>
                    <span>138 0000 8888</span>
                  </div>
                  <div class="field">
                    <label>常驻配送区域</label>
                    <span>开州区汉丰街道 / 滨湖片区</span>
                  </div>
                  <div class="field">
                    <label>交通工具</label>
                    <span>电动车</span>
                  </div>
                  <div class="field">
                    <label>资料项</label>
                    <span>身份证、人脸信息、健康证、行驶信息</span>
                  </div>
                </div>
              </div>
            </section>

            <section class="section">
              <div class="button-row">
                <button
                  class="button button--primary"
                  type="button"
                  data-submit-next="reviewing.html"
                  data-submit-message="骑手资料已提交，进入审核中"
                >
                  提交申请
                </button>
                <a class="button button--secondary" href="../index.html">稍后再看</a>
              </div>
            </section>
          </main>
        </div>
      </div>
    </div>
    <script src="../../shared/common.js"></script>
  </body>
</html>
