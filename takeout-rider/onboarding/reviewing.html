<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>审核中 - 开州金厨骑手端</title>
    <link rel="stylesheet" href="../../shared/theme.css">
    <link rel="stylesheet" href="../../shared/mobile-app.css">
  </head>
  <body class="app-preview-page">
    <div class="preview-layout">
      <div class="mobile-frame">
        <div class="screen">
          <div class="status-bar">
            <span>09:41</span>
            <span class="status-bar__capsule">资格审核</span>
          </div>
          <header class="header header--compact">
            <a class="back-link" href="./apply.html">返回申请页</a>
            <h1 class="page-title">资料审核中</h1>
            <p class="page-subtitle">这里展示骑手资料已入队审核、等待通过的中间状态。</p>
          </header>
          <main class="content">
            <div class="steps" aria-label="入驻步骤">
              <span class="step-dot is-complete">1</span>
              <span class="step-line is-complete"></span>
              <span class="step-dot is-active">2</span>
              <span class="step-line"></span>
              <span class="step-dot">3</span>
            </div>

            <section class="timeline-card">
              <div class="timeline">
                <div class="timeline-item">
                  <span class="timeline-pin"></span>
                  <div>
                    <strong>基础资料已接收</strong>
                    <div class="meta-line">06-25 09:42 · 信息已进入骑手审核队列</div>
                  </div>
                </div>
                <div class="timeline-item">
                  <span class="timeline-pin"></span>
                  <div>
                    <strong>等待平台复核</strong>
                    <div class="meta-line">平台将确认身份、区域与交通工具信息</div>
                  </div>
                </div>
                <div class="timeline-item">
                  <span class="timeline-pin"></span>
                  <div>
                    <strong>通过后即可开始接单</strong>
                    <div class="meta-line">审核成功后可直接进入骑手端首页</div>
                  </div>
                </div>
              </div>
            </section>

            <section class="section">
              <div class="button-row">
                <a class="button button--primary" href="./success.html">模拟审核通过</a>
                <a class="button button--secondary" href="../index.html">返回封面</a>
              </div>
            </section>
          </main>
        </div>
      </div>
    </div>
    <script src="../../shared/common.js"></script>
  </body>
</html>
