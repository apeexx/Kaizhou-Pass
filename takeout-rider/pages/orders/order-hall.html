<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>订单大厅 - 外卖骑手端</title>
  <link rel="stylesheet" href="../../assets/css/base.css">
  <link rel="stylesheet" href="../../assets/css/app.css">
  <link rel="icon" href="data:,">
</head>
<body class="theme-commerce" data-page="order-hall">
  <div class="app-shell proto-shell">
    <div class="proto-statusbar"><span>9:41</span><span class="proto-icons">▮▮▮ WiFi ▰</span></div>
    <header class="proto-topbar">
      <a class="proto-back" href="../dashboard/rider-home.html" aria-label="返回">‹</a>
      <h1 class="proto-title">订单大厅</h1>
      <span></span>
    </header>
    <main class="proto-main">
      <section class="proto-card is-gray">
        <h2>附近可抢配送订单</h2>
        <p class="proto-sub">当前半径 3km 内有 8 个配送任务，全部为静态演示数据。</p>
      </section>

      <section class="proto-card proto-order-card">
        <div class="proto-order-top">
          <img class="proto-order-thumb" src="../../assets/images/noodle-bowl.jpg" alt="开州小面馆订单">
          <div>
            <strong class="food-name">开州小面馆</strong>
            <span class="item-subtitle">12:35 前送达 · 商家 0.8km</span>
          </div>
          <span class="proto-money">¥6.5</span>
        </div>
        <div class="proto-route-pair">
          <div class="proto-route-line"><span class="proto-dot orange">取</span><span>文峰街道滨湖路 8 号</span></div>
          <div class="proto-route-line"><span class="proto-dot">送</span><span>中央国际 B 区，用户距商家 2.4km</span></div>
        </div>
        <a class="proto-btn full" href="order-detail.html">查看并抢单</a>
      </section>

      <section class="proto-card proto-order-card">
        <div class="proto-order-top">
          <img class="proto-order-thumb" src="../../assets/images/red-braised-pork.jpg" alt="渝味冒菜订单">
          <div>
            <strong class="food-name">渝味冒菜</strong>
            <span class="item-subtitle">12:42 前送达 · 商家 1.1km</span>
          </div>
          <span class="proto-money">¥5.8</span>
        </div>
        <div class="proto-route-pair">
          <div class="proto-route-line"><span class="proto-dot orange">取</span><span>汉丰新城步行街 18 号</span></div>
          <div class="proto-route-line"><span class="proto-dot">送</span><span>凤凰城 2 栋，预计 18 分钟</span></div>
        </div>
        <a class="proto-btn full" href="order-detail.html">查看并抢单</a>
      </section>

      <section class="proto-card proto-order-card">
        <div class="proto-order-top">
          <img class="proto-order-thumb" src="../../assets/images/restaurant-kitchen.jpg" alt="金厨快餐订单">
          <div>
            <strong class="food-name">金厨快餐</strong>
            <span class="item-subtitle">12:50 前送达 · 商家 1.4km</span>
          </div>
          <span class="proto-money">¥8.2</span>
        </div>
        <div class="proto-route-pair">
          <div class="proto-route-line"><span class="proto-dot orange">取</span><span>汉丰街道美食街 12 号</span></div>
          <div class="proto-route-line"><span class="proto-dot">送</span><span>云枫小区 3 栋，预计 29 分钟</span></div>
        </div>
        <a class="proto-btn full" href="order-detail.html">查看并抢单</a>
      </section>
    </main>
    <nav class="bottom-nav">
      <a class="nav-item" data-nav="home" href="../dashboard/rider-home.html"><span class="nav-icon">首</span><span>首页</span></a>
      <a class="nav-item" data-nav="orders" href="order-hall.html"><span class="nav-icon">单</span><span>订单</span></a>
      <a class="nav-item" data-nav="route" href="../route/route-map.html"><span class="nav-icon">图</span><span>地图</span></a>
      <a class="nav-item" data-nav="income" href="../income/income-home.html"><span class="nav-icon">收</span><span>收入</span></a>
      <a class="nav-item" data-nav="mine" href="../mine/profile.html"><span class="nav-icon">我</span><span>我的</span></a>
    </nav>
  </div>
  <div class="toast" data-toast-root hidden></div>
  <script src="../../assets/js/mock.js" defer></script>
</body>
</html>
