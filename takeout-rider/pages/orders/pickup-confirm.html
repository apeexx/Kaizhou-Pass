<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>确认取餐 - 外卖骑手端</title>
  <link rel="stylesheet" href="../../assets/css/base.css">
  <link rel="stylesheet" href="../../assets/css/app.css">
  <link rel="icon" href="data:,">
</head>
<body data-page="pickup-confirm">
  <div class="app-shell proto-shell">
    <div class="proto-statusbar"><span>9:41</span><span class="proto-icons">▮▮▮ WiFi ▰</span></div>
    <header class="proto-topbar">
      <a class="proto-back" href="current-order.html" aria-label="返回">‹</a>
      <h1 class="proto-title">订单详情</h1>
      <span></span>
    </header>
    <main class="proto-main">
      <section class="proto-card is-gray pickup-code">
        <h2>请凭取餐码到店取餐</h2>
        <p class="proto-sub" style="text-align:left">取餐码</p>
        <span class="code">6402</span>
        <span class="time">请在11:30前到店取餐</span>
      </section>

      <section class="proto-card is-gray">
        <h2 class="shop-card-title">川味小厨（开州建委店）</h2>
        <div class="proto-divider"></div>
        <div class="food-list">
          <div class="food-row"><img class="food-thumb-img" src="../../assets/images/red-braised-pork.jpg" alt="招牌红烧肉"><div><strong class="food-name">招牌红烧肉</strong><span class="food-price">¥28</span></div><span class="food-qty">x1</span></div>
          <div class="food-row"><img class="food-thumb-img" src="../../assets/images/noodle-bowl.jpg" alt="重庆小面"><div><strong class="food-name">重庆小面</strong><span class="food-price">¥18</span></div><span class="food-qty">x1</span></div>
          <div class="food-row"><img class="food-thumb-img" src="../../assets/images/red-braised-pork.jpg" alt="红烧肉加量"><div><strong class="food-name">红烧肉加量</strong><span class="food-price">¥28</span></div><span class="food-qty">x1</span></div>
        </div>
        <button class="expand-more" type="button" data-toast="展开更多为静态演示">展开更多⌄</button>
      </section>
      <section class="fee-list"><div class="fee-row"><span>商品金额</span><span>¥299</span></div></section>
    </main>
    <div class="bottom-action">
      <a class="proto-btn full" href="delivery-confirm.html">确认已取餐</a>
    </div>
  </div>
  <div class="toast" data-toast-root hidden></div>
  <script src="../../assets/js/mock.js" defer></script>
</body>
</html>
