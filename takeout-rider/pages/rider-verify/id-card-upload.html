<!doctype html>
<html lang="zh-CN">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>身份证认证 - 外卖骑手端</title><link rel="stylesheet" href="../../assets/css/base.css"><link rel="stylesheet" href="../../assets/css/app.css"><link rel="icon" href="data:,"></head>
<body class="theme-commerce" data-page="id-card-upload">
  <div class="app-shell">
    <header class="app-header"><div class="header-row"><a class="back-link" href="rider-info.html" aria-label="返回">‹</a><div style="flex:1"><h1 class="header-title">身份证认证</h1><p class="header-subtitle">上传卡片为静态占位，不提交真实文件</p></div></div></header>
    <main class="main app-main">
      <section class="upload-grid">
        <button class="upload-card has-media" type="button" data-upload-demo><img src="../../assets/images/delivery-rider.jpg" alt="证件资料准备占位"><span><strong class="item-title">身份证正面</strong><span class="item-subtitle">点击选择静态示例，不展示真实证件。</span></span></button>
        <button class="upload-card has-media" type="button" data-upload-demo><img src="../../assets/images/takeout-packaging.jpg" alt="骑手资料审核占位"><span><strong class="item-title">身份证反面</strong><span class="item-subtitle">点击选择静态示例，不保存真实文件。</span></span></button>
      </section>
      <section class="section card"><div class="row-left"><span class="row-icon">脸</span><div><strong class="item-title">人脸识别占位</strong><span class="item-subtitle">真实识别能力未接入，仅展示认证流程位置。</span></div></div></section>
      <section class="section card"><h2 class="section-title">认证说明</h2><p class="item-subtitle">请确保姓名、证件号和骑手资料一致。演示页面只展示流程，不保存或上传真实证件。</p></section>
      <a class="btn green" href="health-card.html">下一步：健康证</a>
    </main>
  </div>
  <div class="toast" data-toast-root hidden></div><script src="../../assets/js/mock.js" defer></script>
</body>
</html>
