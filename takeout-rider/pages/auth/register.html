<!doctype html>
<html lang="zh-CN">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>骑手注册 - 外卖骑手端</title><link rel="stylesheet" href="../../assets/css/base.css"><link rel="stylesheet" href="../../assets/css/app.css"><link rel="icon" href="data:,"></head>
<body class="theme-commerce" data-page="register">
  <div class="app-shell">
    <header class="app-header"><div class="header-row"><a class="back-link" href="login.html" aria-label="返回">‹</a><div style="flex:1"><h1 class="header-title">骑手注册</h1><p class="header-subtitle">创建配送账号后进入入驻认证</p></div></div></header>
    <main class="main app-main">
      <section class="media-card"><img src="../../assets/images/delivery-rider.jpg" alt="骑手注册配送装备"><div class="media-body"><strong class="item-title">加入开州金厨配送</strong><span class="item-subtitle">注册后提交基础资料、身份认证和健康证信息；本页只做静态演示。</span></div></section>
      <form class="form-card form-grid" data-demo-form data-redirect="../rider-verify/rider-info.html" data-success="注册信息已保存，进入骑手资料">
        <div class="field"><label for="phone">骑手手机号</label><input id="phone" value="139****5678"></div>
        <div class="field"><label for="code">验证码</label><input id="code" value="2688"></div>
        <div class="field"><label for="password">设置密码</label><input id="password" type="password" value="123456"></div>
        <label class="agreement"><input type="checkbox" checked> 我已阅读并同意骑手服务协议和配送安全规范。</label>
        <button class="btn yellow" type="submit">注册并继续认证</button>
      </form>
    </main>
  </div>
  <div class="toast" data-toast-root hidden></div><script src="../../assets/js/mock.js" defer></script>
</body>
</html>
