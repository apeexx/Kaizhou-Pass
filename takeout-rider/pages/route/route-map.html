<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>路线地图 - 外卖骑手端</title>
  <link rel="stylesheet" href="../../assets/css/base.css">
  <link rel="stylesheet" href="../../assets/css/app.css">
  <link rel="icon" href="data:,">
</head>
<body data-page="route-map">
  <div class="app-shell proto-shell">
    <div class="proto-statusbar"><span>9:41</span><span class="proto-icons">▮▮▮ WiFi ▰</span></div>
    <header class="proto-topbar">
      <a class="proto-back" href="../orders/current-order.html" aria-label="返回">‹</a>
      <h1 class="proto-title">路线地图</h1>
      <span></span>
    </header>
    <main class="proto-main">
      <section class="proto-card">
        <h2>配送路线</h2>
        <p class="proto-sub">静态地图占位，不接真实地图接口或定位服务。</p>
      </section>

      <section class="proto-card is-map">
        <div class="proto-route-map">
          <span class="proto-map-pin shop">商</span>
          <span class="proto-map-pin rider">骑</span>
          <span class="proto-map-pin user">客</span>
        </div>
      </section>

      <section class="proto-card">
        <div class="row-between">
          <h2>路线步骤</h2>
          <span class="proto-money">22分钟</span>
        </div>
        <div class="proto-divider"></div>
        <div class="proto-step-list">
          <div class="proto-step is-active"><span class="proto-step-num">1</span><div><strong class="food-name">前往商家</strong><span class="item-subtitle">当前位置：汉丰街道人民路口，距商家 0.8km</span></div></div>
          <div class="proto-step"><span class="proto-step-num">2</span><div><strong class="food-name">到店取餐</strong><span class="item-subtitle">商家位置：滨湖路 8 号，取餐码 6402</span></div></div>
          <div class="proto-step"><span class="proto-step-num">3</span><div><strong class="food-name">前往用户</strong><span class="item-subtitle">用户位置：中央国际 B 区 3 栋 1802</span></div></div>
          <div class="proto-step"><span class="proto-step-num">4</span><div><strong class="food-name">完成送达</strong><span class="item-subtitle">送达后回到订单页确认，本页不接真实导航。</span></div></div>
        </div>
      </section>
    </main>
    <nav class="bottom-nav">
      <a class="nav-item" data-nav="home" href="../dashboard/rider-home.html"><span class="nav-icon">首</span><span>首页</span></a>
      <a class="nav-item" data-nav="orders" href="../orders/order-hall.html"><span class="nav-icon">单</span><span>订单</span></a>
      <a class="nav-item" data-nav="route" href="route-map.html"><span class="nav-icon">图</span><span>地图</span></a>
      <a class="nav-item" data-nav="income" href="../income/income-home.html"><span class="nav-icon">收</span><span>收入</span></a>
      <a class="nav-item" data-nav="mine" href="../mine/profile.html"><span class="nav-icon">我</span><span>我的</span></a>
    </nav>
  </div>
  <div class="toast" data-toast-root hidden></div>
  <script src="../../assets/js/mock.js" defer></script>
</body>
</html>
