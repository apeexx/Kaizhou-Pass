<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>骑手首页 - 外卖骑手端</title>
  <link rel="stylesheet" href="../../assets/css/base.css">
  <link rel="stylesheet" href="../../assets/css/app.css">
  <link rel="icon" href="data:,">
</head>
<body data-page="rider-home">
  <div class="app-shell proto-shell">
    <div class="proto-statusbar"><span>9:41</span><span class="proto-icons">▮▮▮ WiFi ▰</span></div>
    <header class="proto-topbar">
      <span></span>
      <h1 class="proto-title">骑手首页</h1>
      <a class="text-btn" href="../message/message-center.html">消息</a>
    </header>
    <main class="proto-main">
      <section class="proto-card proto-home-hero">
        <img class="proto-hero-photo" src="../../assets/images/restaurant-kitchen.jpg" alt="餐饮门店出餐环境">
        <div class="proto-hero-body">
          <div class="row-between">
            <div>
              <h2>李师傅，接单中</h2>
              <p class="proto-sub">评分 4.9 · 已认证骑手 · 重庆开州</p>
            </div>
            <button class="proto-btn secondary" type="button" data-rider-toggle>开关</button>
          </div>
          <div class="proto-stats">
            <div class="proto-stat"><strong>18</strong><span>完成单</span></div>
            <div class="proto-stat"><strong>¥286</strong><span>今日收入</span></div>
            <div class="proto-stat"><strong>42km</strong><span>里程</span></div>
            <div class="proto-stat"><strong>98%</strong><span>准时率</span></div>
          </div>
        </div>
      </section>

      <section class="proto-card proto-order-card">
        <div class="row-between">
          <h2>当前配送任务</h2>
          <span class="proto-money">配送中</span>
        </div>
        <div class="proto-order-top">
          <img class="proto-order-thumb" src="../../assets/images/red-braised-pork.jpg" alt="当前配送菜品">
          <div>
            <strong class="food-name">川味小厨（开州建委店）</strong>
            <span class="item-subtitle">取餐码 6402 · 预计 12:05 前送达</span>
          </div>
          <span class="proto-money">¥6.5</span>
        </div>
        <div class="proto-route-pair">
          <div class="proto-route-line"><span class="proto-dot orange">取</span><span>滨湖路 8 号，商家距您 0.8km</span></div>
          <div class="proto-route-line"><span class="proto-dot">送</span><span>中央国际 B 区 3 栋 1802</span></div>
        </div>
        <div class="actions">
          <a class="proto-btn full" href="../orders/current-order.html">处理任务</a>
        </div>
      </section>

      <section class="proto-card proto-order-card">
        <div class="row-between">
          <h2>附近可抢订单</h2>
          <a class="text-btn" href="../orders/order-hall.html">全部</a>
        </div>
        <div class="proto-order-top">
          <img class="proto-order-thumb" src="../../assets/images/noodle-bowl.jpg" alt="重庆小面">
          <div>
            <strong class="food-name">开州小面馆</strong>
            <span class="item-subtitle">商家 0.8km · 用户 2.4km · 22分钟</span>
          </div>
          <span class="proto-money">¥6.5</span>
        </div>
        <div class="actions">
          <a class="proto-btn full" href="../orders/order-detail.html">去抢单</a>
        </div>
      </section>
    </main>
    <nav class="bottom-nav">
      <a class="nav-item" data-nav="home" href="rider-home.html"><span class="nav-icon">首</span><span>首页</span></a>
      <a class="nav-item" data-nav="orders" href="../orders/order-hall.html"><span class="nav-icon">单</span><span>订单</span></a>
      <a class="nav-item" data-nav="route" href="../route/route-map.html"><span class="nav-icon">图</span><span>地图</span></a>
      <a class="nav-item" data-nav="income" href="../income/income-home.html"><span class="nav-icon">收</span><span>收入</span></a>
      <a class="nav-item" data-nav="mine" href="../mine/profile.html"><span class="nav-icon">我</span><span>我的</span></a>
    </nav>
  </div>
  <div class="toast" data-toast-root hidden></div>
  <script src="../../assets/js/mock.js" defer></script>
</body>
</html>
